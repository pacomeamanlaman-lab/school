<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=375, maximum-scale=1">
<title>ARIA — Redesign</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0d0f;
    --surface: #111518;
    --surface2: #181d21;
    --border: rgba(255,255,255,0.07);
    --safe: #22c55e;
    --safe-dim: rgba(34,197,94,0.12);
    --safe-glow: rgba(34,197,94,0.25);
    --sos: #ef4444;
    --sos-dim: rgba(239,68,68,0.12);
    --warn: #f59e0b;
    --warn-dim: rgba(245,158,11,0.12);
    --text: #f0f4f8;
    --text-muted: rgba(240,244,248,0.45);
    --text-faint: rgba(240,244,248,0.25);
    --radius: 20px;
    --radius-sm: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px 0 40px;
  }

  .phone {
    width: 375px;
    min-height: 812px;
    background: var(--bg);
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 40px 120px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.08);
    display: flex;
    flex-direction: column;
  }

  /* ── Status Bar ── */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 0;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
  }
  .status-time { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); }

  /* ── Header ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 24px 12px;
  }
  .logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: var(--safe); }
  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(34,197,94,0.1);
    border: 1px solid rgba(34,197,94,0.25);
    border-radius: 30px;
    padding: 5px 12px;
    font-size: 11px;
    font-weight: 600;
    color: var(--safe);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .live-dot {
    width: 6px; height: 6px;
    background: var(--safe);
    border-radius: 50%;
    animation: pulse-dot 1.5s ease-in-out infinite;
  }

  /* ── Zone Card ── */
  .zone-card {
    margin: 8px 20px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 28px 24px 24px;
    position: relative;
    overflow: hidden;
  }
  .zone-card::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, var(--safe-glow) 0%, transparent 70%);
    pointer-events: none;
  }

  .zone-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .zone-status-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-faint);
    margin-bottom: 6px;
  }
  .zone-title {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.1;
  }
  .zone-title .highlight { color: var(--safe); }

  .zone-orb {
    width: 64px; height: 64px;
    background: radial-gradient(circle at 40% 35%, #4ade80, #16a34a 60%, #052e16);
    border-radius: 50%;
    box-shadow: 0 0 0 8px var(--safe-dim), 0 0 24px var(--safe-glow);
    animation: orb-breathe 3s ease-in-out infinite;
    flex-shrink: 0;
  }

  .zone-location {
    display: flex;
    align-items: center;
    gap: 7px;
    color: var(--text-muted);
    font-size: 13.5px;
    font-weight: 400;
    margin-bottom: 6px;
  }
  .zone-location svg { opacity: 0.6; flex-shrink: 0; }
  .zone-sub {
    font-size: 12.5px;
    color: var(--text-faint);
    padding-left: 21px;
  }

  /* ── Risk Meter ── */
  .risk-row {
    display: flex;
    gap: 4px;
    margin-top: 20px;
  }
  .risk-bar {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
  }
  .risk-bar.active { background: var(--safe); }
  .risk-label {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.3px;
  }

  /* ── CTA Principal ── */
  .cta-section {
    padding: 20px 20px 0;
  }
  .btn-home {
    width: 100%;
    padding: 20px;
    background: linear-gradient(135deg, #16a34a, #15803d);
    border: none;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 8px 32px rgba(34,197,94,0.3);
  }
  .btn-home::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
  }
  .btn-home:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(34,197,94,0.4); }
  .btn-home:active { transform: scale(0.98); }
  .btn-home-left { text-align: left; }
  .btn-home-label { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.65); text-transform: uppercase; letter-spacing: 0.8px; }
  .btn-home-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: #fff; margin-top: 2px; }
  .btn-home-icon {
    width: 48px; height: 48px;
    background: rgba(255,255,255,0.15);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* ── Actions Grid ── */
  .actions-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 12px 20px 0;
  }
  .action-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.15s;
    text-align: left;
  }
  .action-btn:hover { background: var(--surface2); transform: translateY(-1px); }
  .action-btn:active { transform: scale(0.97); }

  .action-btn.sos {
    border-color: var(--sos-dim);
    background: linear-gradient(135deg, rgba(239,68,68,0.08), transparent);
  }
  .action-btn.sos:hover { border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.1); }

  .action-btn.warn {
    border-color: rgba(245,158,11,0.15);
    background: linear-gradient(135deg, rgba(245,158,11,0.06), transparent);
  }
  .action-btn.warn:hover { border-color: rgba(245,158,11,0.3); }

  .action-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .action-icon.safe-icon { background: var(--safe-dim); }
  .action-icon.sos-icon { background: var(--sos-dim); }
  .action-icon.warn-icon { background: var(--warn-dim); }
  .action-icon.map-icon { background: rgba(99,102,241,0.12); }

  .action-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }
  .action-sub {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 1px;
    line-height: 1.3;
  }

  /* ── Bottom Nav ── */
  .bottom-nav {
    margin-top: auto;
    padding: 16px 20px 28px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    border-top: 1px solid var(--border);
    background: rgba(10,13,15,0.95);
    backdrop-filter: blur(20px);
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    opacity: 0.45;
    transition: opacity 0.15s;
    min-width: 52px;
  }
  .nav-item.active { opacity: 1; }
  .nav-item.active svg path, .nav-item.active svg rect, .nav-item.active svg circle { stroke: var(--safe) !important; }
  .nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.3px; color: var(--text-muted); }
  .nav-item.active .nav-label { color: var(--safe); }

  /* ── Animations ── */
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
  @keyframes orb-breathe {
    0%, 100% { box-shadow: 0 0 0 8px var(--safe-dim), 0 0 24px var(--safe-glow); }
    50% { box-shadow: 0 0 0 14px rgba(34,197,94,0.07), 0 0 36px var(--safe-glow); }
  }

  /* Staggered entrance */
  .zone-card, .cta-section, .actions-grid, .bottom-nav {
    animation: fadeUp 0.5s ease both;
  }
  .cta-section { animation-delay: 0.08s; }
  .actions-grid { animation-delay: 0.16s; }
  .bottom-nav { animation-delay: 0.22s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Spacer for bottom */
  .spacer { height: 16px; }
</style>
</head>
<body>
<div class="phone">
